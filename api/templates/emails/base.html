<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: #e8e8ed;
      background-color: #0d0b14;
      margin: 0;
      padding: 0;
    }
    .wrapper {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .card {
      background: #131122;
      border-radius: 12px;
      border: 1px solid rgba(99, 102, 241, 0.15);
      overflow: hidden;
    }
    .header {
      background: #0d0b14;
      border-bottom: 1px solid rgba(99, 102, 241, 0.2);
      padding: 24px;
      text-align: center;
    }
    .logo {
      text-decoration: none;
      font-size: 26px;
      line-height: 1;
    }
    .logo-brand {
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-tld {
      font-weight: 300;
      color: #a1a1b5;
    }
    .content {
      padding: 32px;
    }
    h1 {
      color: #f0f0f5;
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 16px;
    }
    h2 {
      color: #e0e0e8;
    }
    p {
      color: #a1a1b5;
      margin: 0 0 16px;
    }
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #f97316 0%, #6366f1 100%);
      color: white !important;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-weight: 600;
      margin: 16px 0;
    }
    .button-container {
      text-align: center;
      margin: 24px 0;
    }
    .muted {
      color: #6b6b80;
      font-size: 14px;
    }
    .link-fallback {
      color: #6b6b80;
      font-size: 12px;
      word-break: break-all;
    }
    .highlight {
      color: #f97316;
      font-weight: 600;
    }
    .footer {
      text-align: center;
      padding: 24px;
      color: #6b6b80;
      font-size: 14px;
    }
    .footer a {
      color: #6366f1;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    ul {
      padding-left: 20px;
      margin: 16px 0;
    }
    li {
      color: #a1a1b5;
      margin-bottom: 8px;
    }
    strong {
      color: #f0f0f5;
    }
    .divider {
      border: none;
      border-top: 1px solid rgba(99, 102, 241, 0.12);
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="header">
        <a href="{{ base_url }}" class="logo">
          <span class="logo-brand">a8n</span><span class="logo-tld">.tools</span>
        </a>
      </div>
      <div class="content">
        {% block content %}{% endblock %}
      </div>
    </div>
    <div class="footer">
      <p>&copy; {{ year }} {{ app_name }}. All rights reserved.</p>
      <p>
        <a href="{{ base_url }}/privacy">Privacy Policy</a> |
        <a href="{{ base_url }}/terms">Terms of Service</a>
      </p>
    </div>
  </div>
</body>
</html>

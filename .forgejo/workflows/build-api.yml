---

# Build API OCI image and push to Forgejo Container Registry.
name: Build API image

on:
  push:
    branches:
      - "main"
      - "feature-*"
    tags:
      - "v*"
    paths:
      - "api/**"
      - "oci-build/get-tags.nu"
      - ".forgejo/workflows/build-api.yml"

jobs:
  build-and-push-api:
    name: Build and push API image
    runs-on: ${{ vars.RUNS_ON_OPENSUSE_BASE_LATEST }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REGISTRY: ""
      REGISTRY_PROVIDER: dev.a8n.run
      REGISTRY_OWNER: ${{ vars.A8N_TOOLS_PRIVATE_PACKAGE_OWNER }}
      REGISTRY_USER: ""
      REGISTRY_PASSWORD: ${{ secrets.A8N_TOOLS_PRIVATE_PACKAGE_PAT }}

    steps:
      - name: Clone the repository
        uses: https://code.forgejo.org/actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Verify Docker availability
        run: |
          docker version
          docker buildx version

      - name: Set up buildx builder
        run: |
          docker buildx create --name container-builder --driver docker-container --use

      - name: Set environment variables
        shell: nu {0}
        run: |
          let owner = $env.REGISTRY_OWNER
          $"REGISTRY_USER=($owner)\n" | save --append $env.GITHUB_ENV
          $"IMAGE_REGISTRY=($env.REGISTRY_PROVIDER)/($owner)\n" | save --append $env.GITHUB_ENV

      - name: Get image tags
        id: get-tags
        shell: nu {0}
        run: |
          let tags = (^nu oci-build/get-tags.nu --joined)
          $"tags=($tags)\n" | save --append $env.GITHUB_OUTPUT

      - name: Log in to container registry
        shell: nu {0}
        run: |
          ^docker login --username $env.REGISTRY_USER --password $env.REGISTRY_PASSWORD $env.REGISTRY_PROVIDER

      - name: Build and push API image
        shell: nu {0}
        run: |
          let tags_str = "${{ steps.get-tags.outputs.tags }}"
          let tags = ($tags_str | split row ",")
          let image = "saas-api"
          let registry = $env.IMAGE_REGISTRY
          let tag_args = ($tags | each {|tag| [-t $"($registry)/($image):($tag)"]} | flatten)
          let cache_ref = $"($registry)/($image):buildcache"
          let cache_from = $"type=registry,ref=($cache_ref)"
          let cache_to = $"type=registry,ref=($cache_ref),mode=max"
          let git_commit = (^git rev-parse --short HEAD | str trim)
          let git_tag = (^git describe --tags --always --dirty | str trim)
          let build_date = (date now | format date "%Y-%m-%dT%H:%M:%SZ")
          let build_args = [
              --build-arg $"GIT_COMMIT=($git_commit)"
              --build-arg $"GIT_TAG=($git_tag)"
              --build-arg $"BUILD_DATE=($build_date)"
          ]
          print $"Building and pushing ($image) with tags: ($tags_str), commit=($git_commit), tag=($git_tag), date=($build_date)"
          ^docker buildx build --push --cache-from $cache_from --cache-to $cache_to ...$build_args ...$tag_args -f oci-build/api/Dockerfile api/

      - name: Print image URLs
        shell: nu {0}
        run: |
          let tags_str = "${{ steps.get-tags.outputs.tags }}"
          let tags = ($tags_str | split row ",")
          let image = "saas-api"
          let registry = $env.IMAGE_REGISTRY
          for tag in $tags {
            print $"Image pushed to ($registry)/($image):($tag)"
          }
